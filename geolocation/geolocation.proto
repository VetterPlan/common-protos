syntax = "proto3";

package geolocation;

// ═══════════════════════════════════════════════════════════════════════════
// GEOLOCATION SERVICE
//
// Conectado con Google Maps Routes API (v2) para distancia y ETA real.
// Fallback automático a Haversine si Google Maps falla.
//
// APIs usadas:
//   - Compute Routes (1→1): ruta exacta entre 2 puntos
//   - Compute Route Matrix (N→M): matriz de rutas (batch)
// ═══════════════════════════════════════════════════════════════════════════

service GeolocationService {
  // Calcula distancia y tiempo de viaje entre 2 puntos (con tráfico real)
  rpc GetTravelEstimate (TravelEstimateRequest) returns (TravelEstimateResponse);

  // Verifica si el cliente está dentro del radio de cobertura del vet
  rpc CheckCoverage (CheckCoverageRequest) returns (CheckCoverageResponse);

  // DEPRECATED: Usar GetTravelEstimate.estimated_minutes.
  // Se mantiene para compatibilidad. No llama a Google Maps internamente.
  rpc GetTransportBuffer (TransportBufferRequest) returns (TransportBufferResponse);

  // NUEVO: Calcula distancia y ETA de N vets a 1 cliente en 1 sola llamada.
  // Usa Route Matrix de Google Maps. Para GetNextAvailableSlots y GetAvailableVets.
  rpc GetBatchTravelEstimates (BatchTravelEstimateRequest) returns (BatchTravelEstimateResponse);

  // ETA en tiempo real para el vet en camino (EN_ROUTE).
  // Solo se llama al marcar EN_ROUTE. Respeta USE_GOOGLE_MAPS_FOR_LIVE_ETA.
  rpc GetLiveETA (LiveETARequest) returns (LiveETAResponse);
}

// ─── GetTravelEstimate ───

message TravelEstimateRequest {
  double origin_lat = 1;
  double origin_lng = 2;
  double destination_lat = 3;
  double destination_lng = 4;
}

message TravelEstimateResponse {
  double distance_km = 1;
  int32 estimated_minutes = 2;              // Con tráfico (Google Maps) o estimado (fallback)
  string method = 3;                        // "GOOGLE_MAPS" / "HAVERSINE_FALLBACK"
  int32 estimated_minutes_no_traffic = 4;   // Sin tráfico (referencia)
}

// ─── CheckCoverage ───

message CheckCoverageRequest {
  double vet_lat = 1;
  double vet_lng = 2;
  double client_lat = 3;
  double client_lng = 4;
  double max_radius_km = 5;                 // Radio máximo de cobertura (default 10km)
}

message CheckCoverageResponse {
  bool is_within_coverage = 1;
  double distance_km = 2;
  int32 estimated_minutes = 3;              // ETA si está en cobertura (con tráfico)
}

// ─── GetTransportBuffer (DEPRECATED) ───

message TransportBufferRequest {
  double origin_lat = 1;
  double origin_lng = 2;
  double destination_lat = 3;
  double destination_lng = 4;
}

message TransportBufferResponse {
  int32 buffer_minutes = 1;
  string calculation_method = 2;            // "GOOGLE_MAPS" / "HAVERSINE_FALLBACK"
}

// ─── GetBatchTravelEstimates (NUEVO) ───

message VetLocation {
  string vet_profile_id = 1;
  double lat = 2;
  double lng = 3;
}

message BatchTravelEstimateRequest {
  repeated VetLocation vet_locations = 1;   // N vets (máx 25 por request de Google)
  double client_lat = 2;                    // 1 cliente
  double client_lng = 3;
  double max_travel_minutes = 4;            // Filtro: excluir vets que tarden más (default 45)
}

message VetTravelEstimate {
  string vet_profile_id = 1;
  double distance_km = 2;
  int32 estimated_minutes = 3;              // Con tráfico
  int32 estimated_minutes_no_traffic = 4;
  bool is_within_range = 5;                 // true si estimated_minutes <= max_travel_minutes
}

message BatchTravelEstimateResponse {
  repeated VetTravelEstimate estimates = 1;
  int32 total_within_range = 2;
  string method = 3;                        // "GOOGLE_MAPS" / "HAVERSINE_FALLBACK"
}

// ─── GetLiveETA ───

message LiveETARequest {
  string appointment_id = 1;               // Para logging/tracing
  double vet_lat = 2;                      // Ubicación actual del vet
  double vet_lng = 3;
  double client_lat = 4;
  double client_lng = 5;
}

message LiveETAResponse {
  int32 eta_minutes = 1;                   // Con tráfico real (Google Maps)
  double distance_km = 2;
  string method = 3;                       // "GOOGLE_MAPS" | "HAVERSINE_FALLBACK"
  int32 eta_minutes_no_traffic = 4;        // Referencia sin tráfico
}
